<!DOCTYPE html>
<html>
<head>
    <title>Food Share System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
        }
        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 5px;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        .card {
            background: #fff;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>🍱 Food Sharing System</h1>

<div class="box">
    <h3>Add Food</h3>
    <input type="text" id="food" placeholder="Food details"><br>
    <input type="text" id="phone" placeholder="Phone number"><br>
    <textarea id="location" placeholder="Location"></textarea><br>
    <button onclick="getLocation()">📍 Get Current Location</button><br><br>
    <button onclick="addFood()">Submit</button>
</div>

<div class="box">
    <h3>Available Food</h3>
    <div id="list"></div>
</div>

<script>
function getLocation() {
    navigator.geolocation.getCurrentPosition(function(pos) {
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;
        document.getElementById("location").value =
            "https://www.google.com/maps?q=" + lat + "," + lon;
    });
}

function addFood() {
    let food = document.getElementById("food").value;
    let phone = document.getElementById("phone").value;
    let location = document.getElementById("location").value;

    if (!food || !phone || !location) {
        alert("Fill all fields");
        return;
    }

    let data = JSON.parse(localStorage.getItem("foods")) || [];
    data.push({ food, phone, location });
    localStorage.setItem("foods", JSON.stringify(data));

    showFood();
}

function showFood() {
    let data = JSON.parse(localStorage.getItem("foods")) || [];
    let html = "";

    data.forEach(item => {
        html += `
        <div class="card">
            <h4>${item.food}</h4>
            <p>📞 ${item.phone}</p>
            <a href="${item.location}" target="_blank">📍 View Location</a><br><br>
            <a href="tel:${item.phone}">
                <button>Call</button>
            </a>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

showFood();
</script>

</body>
</html>
